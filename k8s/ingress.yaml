apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-passport-viewer-ingress
  namespace: digital-passport
  labels:
    app: digital-passport-viewer
    component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - digital-passport.your-domain.com
    secretName: digital-passport-tls
  rules:
  - host: digital-passport.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: digital-passport-viewer-service
            port:
              number: 80