apiVersion: v1
kind: Service
metadata:
  name: digital-passport-viewer-service
  namespace: digital-passport
  labels:
    app: digital-passport-viewer
    component: frontend
spec:
  selector:
    app: digital-passport-viewer
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP