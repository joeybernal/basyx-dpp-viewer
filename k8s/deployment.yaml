apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-passport-viewer
  namespace: digital-passport
  labels:
    app: digital-passport-viewer
    version: v1.0.0
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: digital-passport-viewer
  template:
    metadata:
      labels:
        app: digital-passport-viewer
        version: v1.0.0
        component: frontend
    spec:
      containers:
      - name: digital-passport-viewer
        image: digital-passport-viewer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        env:
        - name: NGINX_WORKER_PROCESSES
          value: "auto"
        - name: NGINX_WORKER_CONNECTIONS
          value: "1024"
      restartPolicy: Always
      terminationGracePeriodSeconds: 30